<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>OG Image Generator — TypeFromPDF</title>
<style>
  body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;font-family:sans-serif;gap:20px;}
  canvas{border:1px solid #333;max-width:100%;}
  button{padding:14px 32px;background:linear-gradient(135deg,#6c5ce7,#7c6dfa,#a29bfe);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;}
  p{color:#7070a8;font-size:14px;}
</style>
</head>
<body>
<p>Preview (1200×630) — click Download to save og-image.png</p>
<canvas id="c" width="1200" height="630"></canvas>
<button onclick="download()">⬇ Download og-image.png</button>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = 1200, H = 630;

// Background
ctx.fillStyle = '#03030d';
ctx.fillRect(0, 0, W, H);

// Purple glow top-left
const g1 = ctx.createRadialGradient(300, 200, 0, 300, 200, 500);
g1.addColorStop(0, 'rgba(108,92,231,0.18)');
g1.addColorStop(1, 'rgba(3,3,13,0)');
ctx.fillStyle = g1;
ctx.fillRect(0, 0, W, H);

// Purple glow bottom-right
const g2 = ctx.createRadialGradient(1000, 500, 0, 1000, 500, 400);
g2.addColorStop(0, 'rgba(124,109,250,0.12)');
g2.addColorStop(1, 'rgba(3,3,13,0)');
ctx.fillStyle = g2;
ctx.fillRect(0, 0, W, H);

// Top border line (accent)
const lineGrad = ctx.createLinearGradient(0, 0, W, 0);
lineGrad.addColorStop(0, 'rgba(108,92,231,0)');
lineGrad.addColorStop(0.3, 'rgba(124,109,250,0.8)');
lineGrad.addColorStop(0.7, 'rgba(162,155,254,0.8)');
lineGrad.addColorStop(1, 'rgba(162,155,254,0)');
ctx.fillStyle = lineGrad;
ctx.fillRect(0, 0, W, 3);

// Badge pill
const bx = 100, by = 140, bw = 310, bh = 40, br = 20;
ctx.beginPath();
ctx.moveTo(bx+br, by); ctx.lineTo(bx+bw-br, by);
ctx.arcTo(bx+bw, by, bx+bw, by+br, br);
ctx.lineTo(bx+bw, by+bh-br);
ctx.arcTo(bx+bw, by+bh, bx+bw-br, by+bh, br);
ctx.lineTo(bx+br, by+bh);
ctx.arcTo(bx, by+bh, bx, by+bh-br, br);
ctx.lineTo(bx, by+br);
ctx.arcTo(bx, by, bx+br, by, br);
ctx.closePath();
ctx.fillStyle = 'rgba(124,109,250,0.12)';
ctx.fill();
ctx.strokeStyle = 'rgba(124,109,250,0.4)';
ctx.lineWidth = 1;
ctx.stroke();

// Badge dot
ctx.beginPath();
ctx.arc(120, by + bh/2, 5, 0, Math.PI*2);
ctx.fillStyle = '#7c6dfa';
ctx.fill();

// Badge text
ctx.fillStyle = '#bfb8ff';
ctx.font = '600 15px Inter, system-ui, sans-serif';
ctx.fillText('Typing practice for students', 135, by + bh/2 + 5);

// Main title "Type"
ctx.font = '900 96px Inter, system-ui, sans-serif';
ctx.fillStyle = '#f0f0ff';
ctx.fillText('Type', 100, 290);

// "FromPDF" with gradient
const titleGrad = ctx.createLinearGradient(340, 0, 780, 0);
titleGrad.addColorStop(0, '#6c5ce7');
titleGrad.addColorStop(0.5, '#7c6dfa');
titleGrad.addColorStop(1, '#a29bfe');
ctx.fillStyle = titleGrad;
ctx.fillText('FromPDF', 340, 290);

// Tagline line 1
ctx.font = '400 32px Inter, system-ui, sans-serif';
ctx.fillStyle = '#f0f0ff';
ctx.fillText('Upload a PDF. Type over it. Actually remember it.', 100, 360);

// Tagline line 2
ctx.font = '400 26px Inter, system-ui, sans-serif';
ctx.fillStyle = '#7070a8';
ctx.fillText('The smarter way to study — with your own notes & textbooks.', 100, 405);

// Divider line
ctx.fillStyle = '#1a1a3a';
ctx.fillRect(100, 460, W - 200, 1);

// URL bottom left
ctx.font = '600 22px Inter, system-ui, sans-serif';
ctx.fillStyle = '#36365a';
ctx.fillText('typefrompdf.com', 100, 510);

// Right side decorative dots grid
for(let row = 0; row < 6; row++){
  for(let col = 0; col < 6; col++){
    ctx.beginPath();
    ctx.arc(900 + col*28, 180 + row*28, 2, 0, Math.PI*2);
    const alpha = 0.08 + Math.random()*0.12;
    ctx.fillStyle = `rgba(124,109,250,${alpha})`;
    ctx.fill();
  }
}

// Decorative card shape (right side)
const cx2 = 820, cy2 = 200, cw = 300, ch = 220, cr = 16;
ctx.beginPath();
ctx.moveTo(cx2+cr, cy2); ctx.lineTo(cx2+cw-cr, cy2);
ctx.arcTo(cx2+cw, cy2, cx2+cw, cy2+cr, cr);
ctx.lineTo(cx2+cw, cy2+ch-cr);
ctx.arcTo(cx2+cw, cy2+ch, cx2+cw-cr, cy2+ch, cr);
ctx.lineTo(cx2+cr, cy2+ch);
ctx.arcTo(cx2, cy2+ch, cx2, cy2+ch-cr, cr);
ctx.lineTo(cx2, cy2+cr);
ctx.arcTo(cx2, cy2, cx2+cr, cy2, cr);
ctx.closePath();
ctx.fillStyle = 'rgba(12,12,34,0.8)';
ctx.fill();
ctx.strokeStyle = '#1a1a3a';
ctx.lineWidth = 1;
ctx.stroke();

// Ghost text lines inside card
const lines = [
  {y:240, w:220, o:0.15},
  {y:268, w:180, o:0.10},
  {y:296, w:240, o:0.15},
  {y:324, w:160, o:0.10},
  {y:352, w:200, o:0.15},
];
lines.forEach(l => {
  ctx.fillStyle = `rgba(112,112,168,${l.o})`;
  ctx.fillRect(840, l.y, l.w, 14);
});

// Typing cursor blink line
ctx.fillStyle = '#7c6dfa';
ctx.fillRect(840, 240, 2, 14);

// "Typing..." label on card
ctx.font = '500 13px Inter, system-ui, sans-serif';
ctx.fillStyle = '#36365a';
ctx.fillText('📄  lecture_notes.pdf', 840, 228);

function download(){
  const a = document.createElement('a');
  a.download = 'og-image.png';
  a.href = c.toDataURL('image/png');
  a.click();
}

// Auto preview in console
console.log('OG image rendered at 1200×630');
</script>
</body>
</html>
